version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7 (the Go-based compiler) has a new API that tsup's bundled
      # rollup-plugin-dts cannot drive yet (dts build crashes). Revisit once
      # tsup supports it, then drop tsconfig's ignoreDeprecations with it.
      - dependency-name: typescript
        versions: [">=7"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
