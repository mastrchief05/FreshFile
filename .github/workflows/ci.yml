name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Lets the exiftool-update workflow run CI on its bot-created PRs, which
  # GITHUB_TOKEN pushes do not trigger via pull_request.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # engines is >=22 and the shipped image tracks current: test the floor
      # and the ceiling so both stay true.
      matrix:
        node: [22, 26]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Package smoke test
        run: node dist/cli.js --help

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      # Runs the integration suite inside the image, against the pinned
      # ExifTool/FFmpeg/ImageMagick/qpdf versions the runtime ships.
      - run: docker build --target test .
      # Smoke-test the final runtime stage the way users run it.
      - name: Runtime image smoke test
        run: |
          docker build -t freshfile-runtime .
          mkdir smoke && printf 'hello freshfile' > smoke/sample.txt
          docker run --rm --user "$(id -u):$(id -g)" -v "$PWD/smoke:/data" freshfile-runtime clean sample.txt
          test -f smoke/fresh_sample.txt
          docker run --rm freshfile-runtime doctor
