name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish to npm with provenance
        # Skip when this version was already published manually.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "freshfile@${VERSION}" version >/dev/null 2>&1; then
            echo "freshfile@${VERSION} already on the registry; skipping publish."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Pack tarball for the GitHub release
        run: npm pack
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: freshfile-*.tgz
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tags
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/freshfile:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/freshfile:latest

  homebrew:
    needs: npm
    runs-on: ubuntu-latest
    # Requires a TAP_GITHUB_TOKEN secret (classic PAT with repo scope for
    # mastrchief05/homebrew-tap). Skipped gracefully while it is missing.
    continue-on-error: true
    steps:
      - name: Bump formula in homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "TAP_GITHUB_TOKEN not configured; skipping formula bump."
            exit 0
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://registry.npmjs.org/freshfile/-/freshfile-${VERSION}.tgz"
          # The registry needs a moment before the tarball is fetchable.
          for i in $(seq 1 20); do
            curl -fsSL "$URL" -o freshfile.tgz && break || sleep 15
          done
          SHA256=$(sha256sum freshfile.tgz | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/homebrew-tap.git"
          cd homebrew-tap
          sed -i -E "s|^  url \".*\"$|  url \"${URL}\"|" Formula/freshfile.rb
          sed -i -E "s|^  sha256 \".*\"$|  sha256 \"${SHA256}\"|" Formula/freshfile.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "freshfile ${VERSION}"
          git push
